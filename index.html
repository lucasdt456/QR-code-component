<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./src/output.css">
  <title>Frontend Mentor | QR code component</title>
</head>
<body class="font-Outfit
  bg-Slate-300 h-screen
  grid place-content-center">

  <section class="w-[322px] 
  bg-White text-center 
    rounded-[20px] overflow-hidden
    shadow-xl/20 shadow-Slate-500
    ">
    
    <div class="p-[16px] mb-3">
      <img class="rounded-xl w-full"
      src="./assets/images/image-qr-code.png" alt="QR code to visit Frontend Mentor">
    </div>
    
    <h1 class="
    text-Slate-900 leading-tight 
    font-black text-[22px] px-8 mb-4
    ">
      Improve your front-end skills by building projects
    </h1>

    <p class="text-Slate-500
    px-8 mb-[38px] text-[15px]
    ">
      Scan the QR code to visit Frontend Mentor and take your coding skills to the next level
    </p>
  </section>
  
</body>
</html>
